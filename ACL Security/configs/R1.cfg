!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R1
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
!
!
ip cef
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
! 
!
!
!
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip address 2.0.0.9 255.255.255.248
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip address 200.145.0.1 255.255.255.0
 ip access-group in-acl in
 ip access-group out-acl out
 duplex auto
 speed auto
!
interface FastEthernet2/0
 ip address 1.0.0.1 255.255.255.248
 duplex auto
 speed auto
!
interface FastEthernet2/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
!
router rip
 version 2
 network 1.0.0.0
 network 2.0.0.0
 network 200.145.0.0
 no auto-summary
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
ip access-list extended in-acl
 evaluate RACL 
 permit udp host 200.145.0.9 host 224.0.0.9 eq rip
 permit tcp any 10.2.2.0 0.0.0.255 eq telnet time-range t3
ip access-list extended out-acl
 permit icmp 185.96.101.0 0.0.0.255 195.121.11.0 0.0.0.255 time-range t1 reflect RACL
 permit icmp 185.96.101.0 0.0.0.255 151.0.0.0 0.255.255.255 time-range t1 reflect RACL
 permit tcp 10.1.1.0 0.0.0.255 any eq telnet time-range t2 reflect RACL
 permit tcp 10.3.3.0 0.0.0.255 any eq telnet time-range t2 reflect RACL
 permit icmp 10.1.1.0 0.0.0.255 any time-range t2 reflect RACL
 permit icmp 10.3.3.0 0.0.0.255 any time-range t2 reflect RACL
!
!
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
time-range t1
 absolute start 00:00 01 October 2025 end 23:59 31 December 2025
 periodic weekdays 6:00 to 17:00
 periodic weekend 11:00 to 23:00
!
time-range t2
 absolute start 00:00 01 January 2025 end 23:59 31 December 2025
 periodic daily 5:00 to 22:00
!
time-range t3
 absolute start 00:00 01 September 2025 end 23:59 31 March 2026
 periodic weekend 20:00 to 23:59
 periodic weekend 0:00 to 8:00
!
!
end
