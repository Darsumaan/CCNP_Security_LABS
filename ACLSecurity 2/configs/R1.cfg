!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R1
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip address 2.0.0.1 255.0.0.0
 ip access-group in-acl in
 ip access-group out-acl out
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip address 1.0.0.1 255.0.0.0
 duplex auto
 speed auto
!
!
router eigrp 100
 network 1.0.0.0
 network 2.0.0.0
 no auto-summary
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
ip access-list extended in-acl
 evaluate RACL 
 deny   ip 0.0.0.0 127.255.255.255 10.0.0.0 0.255.255.255 time-range t5
 deny   ip 0.0.0.0 127.255.255.255 172.16.0.0 0.15.255.255 time-range t5
 deny   ip 10.0.0.0 0.255.255.255 0.0.0.0 127.255.255.255 time-range t5
 deny   ip 10.0.0.0 0.255.255.255 128.0.0.0 63.255.255.255 time-range t5
 permit ip 0.0.0.0 127.255.255.255 128.0.0.0 63.255.255.255 time-range t5 reflect abc
 permit ip 0.0.0.0 127.255.255.255 0.0.0.0 127.255.255.255 time-range t5 reflect abc
 permit eigrp host 2.0.0.4 host 224.0.0.10
 permit eigrp host 2.0.0.4 host 2.0.0.1
ip access-list extended out-acl
 permit ip 10.0.0.0 0.255.255.255 10.0.0.0 0.255.255.255 time-range t1 reflect RACL
 permit ip 10.0.0.0 0.255.255.255 172.16.0.0 0.15.255.255 time-range t1 reflect RACL
 deny   ip 128.0.0.0 63.255.255.255 192.168.0.0 0.0.255.255 time-range t2
 permit ip 128.0.0.0 63.255.255.255 192.0.0.0 31.255.255.255 time-range t2 reflect RACL
 deny   tcp 192.168.0.0 0.0.255.255 host 5.0.0.5 eq telnet time-range t3
 permit tcp 192.0.0.0 31.255.255.255 host 5.0.0.5 eq telnet time-range t3 reflect RACL
 permit icmp 192.0.0.0 31.255.255.255 host 7.0.0.7 time-range t4 reflect RACL
 evaluate abc 
!
!
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
time-range t1
 absolute start 00:00 01 September 2025 end 23:59 31 December 2025
 periodic weekdays 9:00 to 15:00
!
time-range t2
 absolute start 00:00 01 January 2025 end 23:59 31 December 2025
 periodic daily 7:00 to 14:00
 periodic daily 20:00 to 23:00
!
time-range t3
 absolute start 00:00 01 July 2025 end 23:59 31 December 2025
 periodic weekend 6:00 to 18:00
!
time-range t4
 absolute start 00:00 01 December 2025 end 23:59 31 December 2025
 periodic daily 6:00 to 17:00
!
time-range t5
 absolute start 00:00 01 January 2025 end 23:59 31 December 2025
 periodic weekdays 8:00 to 17:00
 periodic weekend 7:00 to 23:00
!
!
end
