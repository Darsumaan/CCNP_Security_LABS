!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R3
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip address 4.0.0.3 255.0.0.0
 ip access-group in-acl in
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip address 5.0.0.3 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/0
 ip address 6.0.0.3 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/1
 ip address 7.0.0.3 255.0.0.0
 duplex auto
 speed auto
!
!
router eigrp 100
 network 4.0.0.0
 network 5.0.0.0
 network 6.0.0.0
 network 7.0.0.0
 no auto-summary
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
ip access-list extended in-acl
 permit eigrp host 4.0.0.4 host 224.0.0.10
 permit eigrp host 4.0.0.4 host 4.0.0.3
 deny   tcp 192.168.0.0 0.0.255.255 host 5.0.0.5 eq telnet time-range t3
 permit tcp 192.0.0.0 31.255.255.255 host 5.0.0.5 eq telnet time-range t3
 permit icmp 192.0.0.0 31.255.255.255 host 7.0.0.7 time-range t4
!
!
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
time-range t3
 absolute start 00:00 01 July 2025 end 23:59 31 December 2025
 periodic weekend 6:00 to 18:00
!
time-range t4
 absolute start 00:00 01 December 2025 end 23:59 31 December 2025
 periodic daily 6:00 to 17:00
!
!
end
