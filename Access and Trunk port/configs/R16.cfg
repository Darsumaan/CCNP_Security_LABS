!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R16
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 ip address 192.168.121.36 255.255.255.224
 speed 100
 full-duplex
!
interface FastEthernet0/1
 ip address 192.168.131.68 255.255.255.192
 speed 100
 full-duplex
!
interface FastEthernet1/0
 ip address 192.168.141.132 255.255.255.128
 speed 100
 full-duplex
!
router ospf 1
 router-id 16.16.16.16
 log-adjacency-changes
 redistribute rip subnets
 network 192.168.121.32 0.0.0.31 area 100
 network 192.168.131.64 0.0.0.63 area 100
!
router rip
 version 2
 redistribute ospf 1 metric 1
 network 192.168.141.0
 no auto-summary
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
