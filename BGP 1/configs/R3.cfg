!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R3
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface Loopback1
 ip address 103.0.0.3 255.0.0.0
!
interface Loopback2
 ip address 113.1.0.3 255.255.0.0
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip address 192.1.23.3 255.255.255.0
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip address 192.1.34.3 255.255.255.0
 duplex auto
 speed auto
!
!
router bgp 3
 no synchronization
 bgp log-neighbor-changes
 network 103.0.0.0
 network 113.1.0.0
 neighbor 192.1.23.2 remote-as 2
 neighbor 192.1.34.4 remote-as 4
 no auto-summary
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
