!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R1
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
crypto isakmp policy 1
 encr 3des
 hash md5
 authentication pre-share
 group 2
!
crypto isakmp policy 2
 encr 3des
 hash md5
 authentication pre-share
 group 2
crypto isakmp key cisco address 190.1.0.6
crypto isakmp key anees address 190.1.0.10
!
!
crypto ipsec transform-set t-set esp-3des esp-sha-hmac 
crypto ipsec transform-set g-set esp-3des esp-sha-hmac 
!
crypto map IMAP 1 ipsec-isakmp 
 set peer 190.1.0.6
 set transform-set t-set 
 match address 100
crypto map IMAP 2 ipsec-isakmp 
 set peer 190.1.0.10
 set transform-set g-set 
 match address 101
!
!
!
!
interface Loopback1
 ip address 192.168.111.1 255.255.255.0
!
interface Loopback2
 ip address 192.168.112.1 255.255.255.0
!
interface Loopback3
 ip address 172.16.0.1 255.255.0.0
!
interface Loopback4
 ip address 172.17.0.1 255.255.0.0
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip address 190.1.0.1 255.255.255.252
 duplex auto
 speed auto
 crypto map IMAP
!
interface FastEthernet1/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
!
ip forward-protocol nd
ip route 0.0.0.0 0.0.0.0 190.1.0.2
!
no ip http server
no ip http secure-server
!
!
access-list 100 permit ip 192.168.111.0 0.0.0.255 192.168.122.0 0.0.0.255
access-list 100 permit ip 192.168.111.0 0.0.0.255 192.168.222.0 0.0.0.255
access-list 100 permit ip 192.168.112.0 0.0.0.255 192.168.122.0 0.0.0.255
access-list 100 permit ip 192.168.112.0 0.0.0.255 192.168.222.0 0.0.0.255
access-list 100 permit ip 172.18.0.0 0.0.255.255 192.168.122.0 0.0.0.255
access-list 100 permit ip 172.18.0.0 0.0.255.255 192.168.222.0 0.0.0.255
access-list 100 permit ip 172.19.0.0 0.0.255.255 192.168.122.0 0.0.0.255
access-list 100 permit ip 172.19.0.0 0.0.255.255 192.168.222.0 0.0.0.255
access-list 101 permit ip 172.16.0.0 0.0.255.255 172.18.0.0 0.0.255.255
access-list 101 permit ip 172.16.0.0 0.0.255.255 172.19.0.0 0.0.255.255
access-list 101 permit ip 172.17.0.0 0.0.255.255 172.18.0.0 0.0.255.255
access-list 101 permit ip 172.17.0.0 0.0.255.255 172.19.0.0 0.0.255.255
access-list 101 permit ip 192.168.122.0 0.0.0.255 172.18.0.0 0.0.255.255
access-list 101 permit ip 192.168.122.0 0.0.0.255 172.19.0.0 0.0.255.255
access-list 101 permit ip 192.168.222.0 0.0.0.255 172.18.0.0 0.0.255.255
access-list 101 permit ip 192.168.222.0 0.0.0.255 172.19.0.0 0.0.255.255
!
!
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
