!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname switch
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
ip cef
!
!
!
!
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
! 
!
!
!
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet0/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet1/0
 switchport access vlan 134
!
interface FastEthernet1/1
 switchport access vlan 143
!
interface FastEthernet1/2
 switchport access vlan 145
!
interface FastEthernet1/3
 switchport access vlan 154
!
interface FastEthernet1/4
 switchport access vlan 167
!
interface FastEthernet1/5
 switchport access vlan 176
!
interface FastEthernet1/6
 switchport access vlan 178
!
interface FastEthernet1/7
 switchport access vlan 187
!
interface FastEthernet1/8
 switchport access vlan 190
!
interface FastEthernet1/9
 switchport mode trunk
!
interface FastEthernet1/10
 switchport access vlan 145
!
interface FastEthernet1/11
 switchport access vlan 143
!
interface FastEthernet1/12
 switchport access vlan 134
!
interface FastEthernet1/13
!
interface FastEthernet1/14
!
interface FastEthernet1/15
!
interface Vlan1
 no ip address
!
interface Vlan176
 ip address 20.0.0.12 255.0.0.0
!
interface Vlan178
 ip address 22.0.0.12 255.0.0.0
!
interface Vlan187
 ip address 24.0.0.12 255.0.0.0
!
interface Vlan190
 ip address 26.0.0.12 255.0.0.0
!
router eigrp 100
 network 20.0.0.0
 network 22.0.0.0
 network 24.0.0.0
 network 26.0.0.0
 no auto-summary
!
ip forward-protocol nd
!
!
ip http server
no ip http secure-server
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
line aux 0
line vty 0 4
 login
!
!
end
