!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R12
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
ip vrf A1
 rd 1:1
 route-target export 1:100
 route-target import 1:100
!
ip vrf B1
 rd 2:2
 route-target export 2:100
 route-target import 2:100
!
ip vrf C1
 rd 3:3
 route-target export 3:100
 route-target import 3:100
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface Loopback1
 ip address 55.0.0.12 255.0.0.0
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip vrf forwarding C1
 ip address 13.0.0.12 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip vrf forwarding A1
 ip address 11.0.0.1 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/0
 ip vrf forwarding B1
 ip address 12.0.0.12 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/1
 ip address 14.0.0.12 255.0.0.0
 duplex auto
 speed auto
 mpls ip
!
!
router eigrp 194
 auto-summary
 !
 address-family ipv4 vrf B1
  redistribute bgp 112 metric 100000 1000 1 1 1
  network 12.0.0.0
  no auto-summary
  autonomous-system 194
 exit-address-family
!
router eigrp 176
 auto-summary
 !
 address-family ipv4 vrf A1
  redistribute bgp 112 metric 100000 1000 1 1 1
  network 11.0.0.0
  no auto-summary
  autonomous-system 176
 exit-address-family
!
router rip
 version 2
 network 14.0.0.0
 network 55.0.0.0
 no auto-summary
 !
 address-family ipv4 vrf C1
  redistribute bgp 112 metric 1
  network 13.0.0.0
  no auto-summary
 exit-address-family
!
router bgp 112
 no synchronization
 bgp log-neighbor-changes
 neighbor 14.0.0.13 remote-as 112
 neighbor 57.0.0.14 remote-as 112
 neighbor 57.0.0.14 ebgp-multihop 255
 neighbor 57.0.0.14 update-source Loopback1
 neighbor 58.0.0.15 remote-as 112
 neighbor 58.0.0.15 ebgp-multihop 255
 neighbor 58.0.0.15 update-source Loopback1
 no auto-summary
 !
 address-family vpnv4
  neighbor 14.0.0.13 activate
  neighbor 14.0.0.13 send-community extended
  neighbor 57.0.0.14 activate
  neighbor 57.0.0.14 send-community extended
  neighbor 58.0.0.15 activate
  neighbor 58.0.0.15 send-community extended
 exit-address-family
 !
 address-family ipv4 vrf C1
  redistribute rip
  no synchronization
 exit-address-family
 !
 address-family ipv4 vrf B1
  redistribute eigrp 194
  no synchronization
 exit-address-family
 !
 address-family ipv4 vrf A1
  redistribute eigrp 176
  no synchronization
 exit-address-family
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
mpls ldp router-id Loopback1
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
