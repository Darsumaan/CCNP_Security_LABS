!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R14
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
ip vrf C1
 rd 3:3
 route-target export 3:100
 route-target import 3:100
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface Loopback1
 ip address 57.0.0.14 255.0.0.0
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip address 15.0.0.14 255.0.0.0
 duplex auto
 speed auto
 mpls ip
!
interface FastEthernet1/1
 ip address 16.0.0.14 255.0.0.0
 duplex auto
 speed auto
 mpls ip
!
interface FastEthernet2/0
 ip vrf forwarding C1
 ip address 17.0.0.14 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
!
router ospf 1 vrf C1
 log-adjacency-changes
 redistribute bgp 112 subnets
 network 17.0.0.0 0.255.255.255 area 100
!
router rip
 version 2
 network 15.0.0.0
 network 16.0.0.0
 network 57.0.0.0
 no auto-summary
!
router bgp 112
 no synchronization
 bgp log-neighbor-changes
 neighbor 15.0.0.13 remote-as 112
 neighbor 16.0.0.15 remote-as 112
 neighbor 55.0.0.12 remote-as 112
 neighbor 55.0.0.12 ebgp-multihop 255
 neighbor 55.0.0.12 update-source Loopback1
 neighbor 58.0.0.15 remote-as 112
 neighbor 58.0.0.15 ebgp-multihop 255
 neighbor 58.0.0.15 update-source Loopback1
 no auto-summary
 !
 address-family vpnv4
  neighbor 15.0.0.13 activate
  neighbor 15.0.0.13 send-community extended
  neighbor 15.0.0.13 route-reflector-client
  neighbor 16.0.0.15 activate
  neighbor 16.0.0.15 send-community extended
  neighbor 16.0.0.15 route-reflector-client
  neighbor 55.0.0.12 activate
  neighbor 55.0.0.12 send-community extended
  neighbor 58.0.0.15 activate
  neighbor 58.0.0.15 send-community extended
 exit-address-family
 !
 address-family ipv4 vrf C1
  redistribute ospf 1 vrf C1 match internal external 2
  no synchronization
 exit-address-family
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
mpls ldp router-id Loopback1
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
