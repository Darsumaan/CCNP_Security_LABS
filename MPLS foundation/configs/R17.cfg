!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R17
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface Loopback1
 ip address 189.110.0.17 255.255.0.0
!
interface Loopback2
 ip address 190.111.0.7 255.255.0.0
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip address 22.0.0.17 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip address 21.0.0.17 255.0.0.0
 duplex auto
 speed auto
!
!
router ospf 2
 router-id 17.17.17.17
 log-adjacency-changes
 network 21.0.0.0 0.255.255.255 area 100
 network 22.0.0.0 0.255.255.255 area 100
 network 189.110.0.0 0.0.255.255 area 100
 network 190.111.0.0 0.0.255.255 area 100
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
