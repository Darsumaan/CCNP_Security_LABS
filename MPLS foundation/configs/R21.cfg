!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R21
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
ip vrf C1
 rd 3:3
 route-target export 3:100
 route-target import 3:100
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface Loopback1
 ip address 61.0.0.21 255.0.0.0
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip vrf forwarding C1
 ip address 18.0.0.21 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip address 24.0.0.21 255.0.0.0
 duplex auto
 speed auto
 mpls ip
!
interface FastEthernet2/0
 ip address 25.0.0.21 255.0.0.0
 duplex auto
 speed auto
 mpls ip
!
interface FastEthernet2/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
!
router ospf 1 vrf C1
 log-adjacency-changes
 redistribute bgp 113 subnets
 network 18.0.0.0 0.255.255.255 area 100
!
router rip
 version 2
 network 24.0.0.0
 network 25.0.0.0
 network 61.0.0.0
 no auto-summary
!
router bgp 113
 no synchronization
 bgp log-neighbor-changes
 neighbor 24.0.0.20 remote-as 113
 neighbor 25.0.0.22 remote-as 113
 no auto-summary
 !
 address-family vpnv4
  neighbor 24.0.0.20 activate
  neighbor 24.0.0.20 send-community extended
  neighbor 24.0.0.20 route-reflector-client
  neighbor 25.0.0.22 activate
  neighbor 25.0.0.22 send-community extended
  neighbor 25.0.0.22 route-reflector-client
 exit-address-family
 !
 address-family ipv4 vrf C1
  redistribute ospf 1 vrf C1 match internal external 2
  no synchronization
 exit-address-family
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
mpls ldp router-id Loopback1
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
