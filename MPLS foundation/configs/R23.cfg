!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R23
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface Loopback1
 ip address 63.0.0.23 255.0.0.0
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip address 26.0.0.23 255.0.0.0
 duplex auto
 speed auto
 mpls ip
!
interface FastEthernet1/1
 ip address 31.0.0.23 255.0.0.0
 duplex auto
 speed auto
 mpls ip
!
interface FastEthernet2/0
 no ip address
 duplex auto
 speed auto
!
interface FastEthernet2/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
!
router eigrp 180
 auto-summary
!
router rip
 version 2
 network 26.0.0.0
 network 31.0.0.0
 network 63.0.0.0
 no auto-summary
!
router bgp 113
 no synchronization
 bgp log-neighbor-changes
 neighbor 65.0.0.25 remote-as 113
 neighbor 65.0.0.25 ebgp-multihop 255
 neighbor 65.0.0.25 update-source Loopback1
 no auto-summary
 !
 address-family vpnv4
  neighbor 65.0.0.25 activate
  neighbor 65.0.0.25 send-community extended
 exit-address-family
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
mpls ldp router-id Loopback1
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
