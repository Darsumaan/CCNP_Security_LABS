!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R4
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
ip vrf B1
 rd 2:2
 route-target export 2:100
 route-target import 2:100
!
ip vrf C1
 rd 3:3
 route-target export 3:100
 route-target import 3:100
!
mpls label range 100 200
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface Loopback1
 ip address 50.0.0.4 255.0.0.0
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip vrf forwarding B1
 ip address 2.0.0.4 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip vrf forwarding C1
 ip address 3.0.0.4 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/0
 ip address 4.0.0.4 255.0.0.0
 duplex auto
 speed auto
 mpls ip
!
interface FastEthernet2/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
!
router eigrp 194
 auto-summary
 !
 address-family ipv4 vrf B1
  redistribute bgp 111 metric 100000 1000 1 1 1
  network 2.0.0.0
  no auto-summary
  autonomous-system 194
 exit-address-family
!
router ospf 1 vrf C1
 log-adjacency-changes
 redistribute bgp 111
 network 3.0.0.0 0.255.255.255 area 100
!
router rip
 version 2
 network 4.0.0.0
 network 50.0.0.0
 no auto-summary
!
router bgp 111
 no synchronization
 bgp log-neighbor-changes
 neighbor 4.0.0.5 remote-as 111
 neighbor 54.0.0.8 remote-as 111
 neighbor 54.0.0.8 ebgp-multihop 255
 neighbor 54.0.0.8 update-source Loopback1
 no auto-summary
 !
 address-family vpnv4
  neighbor 4.0.0.5 activate
  neighbor 4.0.0.5 send-community extended
  neighbor 54.0.0.8 activate
  neighbor 54.0.0.8 send-community extended
 exit-address-family
 !
 address-family ipv4 vrf C1
  redistribute ospf 1 vrf C1 match internal external 2
  no synchronization
 exit-address-family
 !
 address-family ipv4 vrf B1
  redistribute eigrp 194
  no synchronization
 exit-address-family
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
mpls ldp router-id Loopback1
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
