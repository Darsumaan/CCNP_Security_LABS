!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R5
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
ip vrf A1
 rd 1:1
 route-target export 1:100
 route-target import 1:100
!
mpls label range 300 400
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface Loopback1
 ip address 51.0.0.5 255.0.0.0
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip vrf forwarding A1
 ip address 1.0.0.5 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip address 4.0.0.5 255.0.0.0
 duplex auto
 speed auto
 mpls ip
!
interface FastEthernet2/0
 ip address 5.0.0.5 255.0.0.0
 duplex auto
 speed auto
 mpls ip
!
interface FastEthernet2/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
!
router rip
 version 2
 network 4.0.0.0
 network 5.0.0.0
 network 51.0.0.0
 no auto-summary
 !
 address-family ipv4 vrf A1
  network 1.0.0.0
  no auto-summary
  version 2
 exit-address-family
!
router bgp 111
 no synchronization
 bgp log-neighbor-changes
 neighbor 54.0.0.8 remote-as 111
 neighbor 54.0.0.8 ebgp-multihop 255
 neighbor 54.0.0.8 update-source Loopback1
 no auto-summary
 !
 address-family vpnv4
  neighbor 54.0.0.8 activate
  neighbor 54.0.0.8 send-community extended
 exit-address-family
 !
 address-family ipv4 vrf A1
  no synchronization
 exit-address-family
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
mpls ldp router-id Loopback1
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
