!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R5
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 ip address 200.0.0.5 255.255.255.252
 speed 100
 full-duplex
!
interface FastEthernet0/0.1
!
interface FastEthernet0/0.2
!
interface FastEthernet0/1
 no ip address
 speed 100
 full-duplex
!
interface FastEthernet0/1.1
 encapsulation dot1Q 140
 ip address 192.168.140.1 255.255.255.0
!
interface FastEthernet0/1.2
 encapsulation dot1Q 150
 ip address 192.168.150.2 255.255.255.0
!
router eigrp 140
 redistribute ospf 150 metric 100000 1000 1 1 1
 redistribute rip metric 100000 1000 1 1 1
 network 192.168.140.0
 no auto-summary
!
router ospf 150
 router-id 5.5.5.5
 log-adjacency-changes
 redistribute eigrp 140 subnets
 redistribute rip subnets
 network 192.168.150.0 0.0.0.255 area 100
!
router rip
 version 2
 redistribute eigrp 140 metric 1
 redistribute ospf 150 metric 1
 network 200.0.0.0
 no auto-summary
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
