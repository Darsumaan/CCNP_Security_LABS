!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R6
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 ip address 200.0.0.6 255.255.255.252
 speed 100
 full-duplex
!
interface FastEthernet0/0.2
!
interface FastEthernet0/1
 no ip address
 speed 100
 full-duplex
!
interface FastEthernet0/1.1
 encapsulation dot1Q 210
 ip address 172.23.0.1 255.255.0.0
!
interface FastEthernet0/1.2
 encapsulation dot1Q 211
 ip address 172.25.0.25 255.255.255.248
!
router eigrp 123
 redistribute eigrp 172
 redistribute rip metric 100000 1000 1 1 1
 network 172.23.0.0
 no auto-summary
!
router eigrp 172
 redistribute eigrp 123
 redistribute rip metric 100000 1000 1 1 1
 network 172.25.0.0
 no auto-summary
!
router rip
 version 2
 redistribute eigrp 123 metric 1
 redistribute eigrp 172 metric 1
 network 200.0.0.0
 no auto-summary
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
