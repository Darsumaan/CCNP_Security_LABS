!
!
!
!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R2
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 ip address 192.168.103.2 255.255.255.0
 speed 100
 full-duplex
!
interface FastEthernet0/1
 ip address 172.16.0.2 255.255.0.0
 speed 100
 full-duplex
!
interface FastEthernet1/0
 ip address 172.17.0.2 255.255.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/0
 ip address 10.0.0.2 255.0.0.0
 duplex auto
 speed auto
!
router eigrp 165
 redistribute rip metric 100000 1000 1 1 1
 redistribute ospf 1 metric 100000 1000 1 1 1
 network 192.168.103.0
 no auto-summary
!
router ospf 1
 router-id 2.2.2.2
 log-adjacency-changes
 redistribute eigrp 165 metric 20 subnets
 redistribute rip subnets
 network 10.0.0.0 0.255.255.255 area 100
 network 172.17.0.0 0.0.255.255 area 100
!
router rip
 version 2
 redistribute eigrp 165 metric 2
 redistribute ospf 1 metric 2
 network 172.16.0.0
 no auto-summary
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
