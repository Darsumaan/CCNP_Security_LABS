!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R4
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
ip vrf B1
 rd 2:2
 route-target export 2:100
 route-target import 2:100
!
ip vrf C1
 rd 3:3
 route-target export 3:100
 route-target import 3:100
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip address 40.0.0.4 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip address 50.0.0.4 255.0.0.0
 duplex auto
 speed auto
!
!
router rip
 version 2
 network 40.0.0.0
 network 50.0.0.0
 no auto-summary
!
router bgp 100
 no synchronization
 bgp router-id 4.4.4.4
 no bgp default route-target filter
 bgp log-neighbor-changes
 neighbor 40.0.0.5 remote-as 100
 neighbor 50.0.0.6 remote-as 100
 no auto-summary
 !
 address-family vpnv4
  neighbor 40.0.0.5 activate
  neighbor 40.0.0.5 send-community extended
  neighbor 40.0.0.5 route-reflector-client
  neighbor 50.0.0.6 activate
  neighbor 50.0.0.6 send-community extended
  neighbor 50.0.0.6 route-reflector-client
 exit-address-family
 !
 address-family ipv4 vrf C1
  no synchronization
 exit-address-family
 !
 address-family ipv4 vrf B1
  no synchronization
 exit-address-family
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
