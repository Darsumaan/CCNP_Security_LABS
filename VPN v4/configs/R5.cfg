!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R5
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
ip vrf A1
 rd 1:1
 route-target export 1:100
 route-target import 1:100
!
ip vrf B1
 rd 2:2
 route-target export 2:100
 route-target import 2:100
!
ip vrf C1
 rd 3:3
 route-target export 3:100
 route-target import 3:100
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip vrf forwarding A1
 ip address 10.0.0.5 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip vrf forwarding B1
 ip address 20.0.0.5 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/0
 ip vrf forwarding C1
 ip address 30.0.0.5 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/1
 ip address 40.0.0.5 255.0.0.0
 duplex auto
 speed auto
!
!
router eigrp 198
 auto-summary
 !
 address-family ipv4 vrf A1
  network 10.0.0.0
  no auto-summary
  autonomous-system 198
 exit-address-family
!
router eigrp 199
 auto-summary
 !
 address-family ipv4 vrf C1
  network 30.0.0.0
  no auto-summary
  autonomous-system 199
 exit-address-family
!
router rip
 version 2
 network 40.0.0.0
 no auto-summary
 !
 address-family ipv4 vrf B1
  network 20.0.0.0
  no auto-summary
  version 2
 exit-address-family
!
router bgp 100
 no synchronization
 bgp log-neighbor-changes
 neighbor 40.0.0.4 remote-as 100
 no auto-summary
 !
 address-family vpnv4
  neighbor 40.0.0.4 activate
  neighbor 40.0.0.4 send-community extended
 exit-address-family
 !
 address-family ipv4 vrf C1
  redistribute eigrp 199
  no synchronization
 exit-address-family
 !
 address-family ipv4 vrf B1
  redistribute rip
  no synchronization
 exit-address-family
 !
 address-family ipv4 vrf A1
  redistribute eigrp 198
  no synchronization
 exit-address-family
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
