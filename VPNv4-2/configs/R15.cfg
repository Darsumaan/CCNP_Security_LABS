!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R15
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
ip vrf A1
 rd 1:1
 route-target export 1:100
 route-target import 1:100
!
ip vrf B1
 rd 2:2
 route-target export 2:100
 route-target import 2:100
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip address 16.0.0.15 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip vrf forwarding B1
 ip address 19.0.0.15 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/0
 ip vrf forwarding A1
 ip address 22.0.0.15 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
!
router ospf 1 vrf B1
 router-id 15.15.15.15
 log-adjacency-changes
 redistribute bgp 112
 network 19.0.0.0 0.255.255.255 area 100
!
router ospf 2 vrf A1
 router-id 15.15.15.16
 log-adjacency-changes
 redistribute bgp 112
 network 22.0.0.0 0.255.255.255 area 100
!
router rip
 version 2
 network 16.0.0.0
 no auto-summary
!
router bgp 112
 no synchronization
 bgp log-neighbor-changes
 neighbor 16.0.0.14 remote-as 112
 no auto-summary
 !
 address-family vpnv4
  neighbor 16.0.0.14 activate
  neighbor 16.0.0.14 send-community extended
 exit-address-family
 !
 address-family ipv4 vrf B1
  redistribute ospf 1 vrf B1 match internal external 2
  no synchronization
 exit-address-family
 !
 address-family ipv4 vrf A1
  redistribute ospf 2 vrf A1 match internal external 2
  no synchronization
 exit-address-family
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
