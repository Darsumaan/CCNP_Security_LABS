!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R24
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
ip vrf B1
 rd 2:2
 route-target export 2:100
 route-target import 2:100
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip address 31.0.0.24 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip address 30.0.0.24 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/0
 ip vrf forwarding B1
 ip address 28.0.0.24 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
!
router eigrp 181
 auto-summary
 !
 address-family ipv4 vrf B1
  redistribute bgp 113 metric 100000 1000 1 1 1
  network 28.0.0.0
  no auto-summary
  autonomous-system 181
 exit-address-family
!
router rip
 version 2
 network 30.0.0.0
 network 31.0.0.0
 no auto-summary
!
router bgp 113
 no synchronization
 bgp log-neighbor-changes
 neighbor 30.0.0.25 remote-as 113
 neighbor 31.0.0.23 remote-as 113
 no auto-summary
 !
 address-family vpnv4
  neighbor 30.0.0.25 activate
  neighbor 30.0.0.25 send-community extended
  neighbor 30.0.0.25 route-reflector-client
  neighbor 31.0.0.23 activate
  neighbor 31.0.0.23 send-community extended
  neighbor 31.0.0.23 route-reflector-client
 exit-address-family
 !
 address-family ipv4 vrf B1
  redistribute eigrp 181
  no synchronization
 exit-address-family
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
