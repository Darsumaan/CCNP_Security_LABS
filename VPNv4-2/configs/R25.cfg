!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R25
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
ip vrf B1
 rd 2:2
 route-target export 2:100
 route-target import 2:100
!
ip vrf C1
 rd 3:3
 route-target export 3:100
 route-target import 3:100
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip address 30.0.0.25 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip vrf forwarding C1
 ip address 29.0.0.25 255.0.0.0
 duplex auto
 speed auto
!
!
router eigrp 182
 auto-summary
 !
 address-family ipv4 vrf C1
  redistribute bgp 113 metric 100000 1000 1 1 1
  network 29.0.0.0
  no auto-summary
  autonomous-system 182
 exit-address-family
!
router rip
 version 2
 network 30.0.0.0
 no auto-summary
!
router bgp 113
 no synchronization
 bgp log-neighbor-changes
 neighbor 30.0.0.24 remote-as 113
 no auto-summary
 !
 address-family vpnv4
  neighbor 30.0.0.24 activate
  neighbor 30.0.0.24 send-community extended
 exit-address-family
 !
 address-family ipv4 vrf C1
  redistribute eigrp 182
  no synchronization
 exit-address-family
 !
 address-family ipv4 vrf B1
  no synchronization
 exit-address-family
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
