!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R2
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
ip vrf A1
 rd 1:1
!
ip vrf B1
 rd 2:2
!
ip vrf C1
 rd 3:3
!
ip vrf forwarding
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip vrf forwarding A1
 ip address 10.0.0.2 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip vrf forwarding B1
 ip address 11.0.0.2 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/0
 ip vrf forwarding C1
 ip address 12.0.0.2 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet2/1
 ip vrf forwarding A1
 ip address 1.0.0.2 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet3/0
 ip vrf forwarding B1
 ip address 2.0.0.2 255.0.0.0
 duplex auto
 speed auto
!
interface FastEthernet3/1
 ip vrf forwarding C1
 ip address 3.0.0.2 255.0.0.0
 duplex auto
 speed auto
!
!
router eigrp 190
 auto-summary
 !
 address-family ipv4 vrf A1
  network 1.0.0.0
  network 10.0.0.0
  no auto-summary
  autonomous-system 190
 exit-address-family
!
router ospf 1 vrf C1
 log-adjacency-changes
 network 3.0.0.0 0.255.255.255 area 100
 network 12.0.0.0 0.255.255.255 area 100
!
router rip
 !
 address-family ipv4 vrf B1
  network 2.0.0.0
  network 11.0.0.0
  no auto-summary
  version 2
 exit-address-family
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
