!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R9
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface FastEthernet0/0
 no ip address
 speed 100
 full-duplex
!
interface FastEthernet0/0.1
 encapsulation dot1Q 40
 ip address 10.0.0.9 255.0.0.0
!
interface FastEthernet0/0.2
 encapsulation dot1Q 50
 ip address 172.16.0.9 255.255.0.0
!
interface FastEthernet0/1
 ip address 172.19.0.9 255.255.0.0
 speed 100
 full-duplex
!
interface FastEthernet1/0
 no ip address
 speed 100
 full-duplex
!
interface FastEthernet1/0.1
 encapsulation dot1Q 55
 ip address 172.17.0.9 255.255.0.0
!
interface FastEthernet1/0.2
 encapsulation dot1Q 62
 ip address 172.18.0.9 255.255.0.0
!
interface FastEthernet2/0
 no ip address
 speed 100
 full-duplex
!
interface FastEthernet2/0.1
 encapsulation dot1Q 144
 ip address 192.168.1.9 255.255.255.0
!
interface FastEthernet2/0.2
 encapsulation dot1Q 155
 ip address 192.168.2.9 255.255.255.0
!
router eigrp 172
 redistribute ospf 1 metric 100000 1000 1 1 1
 redistribute rip metric 100000 1000 1 1 1
 redistribute eigrp 197
 redistribute eigrp 144
 redistribute eigrp 174
 network 172.16.0.0
 no auto-summary
!
router eigrp 197
 redistribute ospf 1 metric 100000 1000 1 1 1
 redistribute rip metric 100000 1000 1 1 1
 redistribute eigrp 172
 redistribute eigrp 144
 redistribute eigrp 174
 network 192.168.1.0
 no auto-summary
!
router eigrp 144
 redistribute ospf 1 metric 100000 1000 1 1 1
 redistribute rip metric 100000 1000 1 1 1
 redistribute eigrp 172
 redistribute eigrp 197
 redistribute eigrp 174
 network 192.168.2.0
 no auto-summary
!
router eigrp 174
 redistribute ospf 1 metric 100000 1000 1 1 1
 redistribute rip metric 100000 1000 1 1 1
 redistribute eigrp 172
 redistribute eigrp 197
 redistribute eigrp 144
 network 172.19.0.0
 no auto-summary
!
router ospf 1
 router-id 9.9.9.9
 log-adjacency-changes
 redistribute rip subnets
 redistribute eigrp 172 subnets
 redistribute eigrp 197 subnets
 redistribute eigrp 144 subnets
 redistribute eigrp 174 subnets
 network 10.0.0.0 0.255.255.255 area 172
 network 172.17.0.0 0.0.255.255 area 0
!
router rip
 version 2
 redistribute ospf 1 metric 1
 redistribute eigrp 172 metric 1
 redistribute eigrp 197 metric 1
 redistribute eigrp 144 metric 1
 redistribute eigrp 174 metric 1
 network 172.18.0.0
 network 172.20.0.0
 no auto-summary
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
