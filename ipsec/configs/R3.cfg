!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R3
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
crypto isakmp policy 1
 encr 3des
 hash md5
 authentication pre-share
 group 2
crypto isakmp key abcd address 190.1.0.1
!
!
crypto ipsec transform-set t-set esp-3des esp-sha-hmac 
!
crypto map imap 1 ipsec-isakmp 
 set peer 190.1.0.1
 set transform-set t-set 
 match address 100
!
!
!
!
interface Loopback1
 ip address 172.16.0.3 255.255.0.0
!
interface Loopback2
 ip address 172.17.0.3 255.255.0.0
!
interface Loopback3
 ip address 172.18.0.3 255.255.0.0
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip address 190.1.0.5 255.255.255.252
 duplex auto
 speed auto
 crypto map imap
!
interface FastEthernet1/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
!
ip forward-protocol nd
ip route 0.0.0.0 0.0.0.0 190.1.0.6
!
no ip http server
no ip http secure-server
!
!
access-list 100 permit ip 172.0.0.0 0.255.255.255 192.168.0.0 0.0.255.255
!
!
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
